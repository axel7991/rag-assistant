name: Deploy RAG Assistant to AWS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ec2-user
          key: ${{ secrets.AWS_KEY }}
          script: |
            cd ~/rag-assistant
            git pull
            docker build -t rag-assistant .
            docker stop rag-assistant || true
            docker rm rag-assistant || true
            docker run -d --env-file .env -p 8000:8000 -v /home/ec2-user/rag-assistant/chroma_data:/app/chroma_data --name rag-assistant rag-assistant